# ============================================================
# Profil PRODUCTION - Utilisé par Render/Clever Cloud
# Les variables sensibles viennent des env vars Render
# ============================================================
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.sql.init.mode=never
spring.h2.console.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS - origine du frontend déployé
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://serviceconnect-frontend.vercel.app}

# API prefix
app.api.prefix=/api
